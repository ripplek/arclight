# US Tech News — Tier 1-3 sources
sources:
  # ── Tier 1: Official / Primary ──
  - name: OpenAI Blog
    type: google-news
    tier: 1
    category: ai
    tags: [ai, openai]
    language: en
    fetchConfig:
      query: "site:openai.com/blog OR site:openai.com/news"

  # ── Tier 2: Major Tech Media ──
  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    type: rss
    tier: 2
    category: tech
    tags: [tech, consumer]
    language: en

  - name: TechCrunch
    url: https://techcrunch.com/feed/
    type: rss
    tier: 2
    category: tech
    tags: [tech, startups]
    language: en

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    type: rss
    tier: 2
    category: ai
    tags: [ai, enterprise]
    language: en

  - name: MIT Tech Review
    url: https://www.technologyreview.com/feed/
    type: rss
    tier: 2
    category: tech
    tags: [tech, research]
    language: en

  # ── Tier 2: AI Labs News (Google News meta-source) ──
  - name: AI Labs News
    type: google-news
    tier: 2
    category: ai
    tags: [ai, labs]
    language: en
    fetchConfig:
      query: "(OpenAI OR Anthropic OR Google DeepMind OR xAI OR Meta AI) when:2d"

  # ── Tier 3: Community / Specialty ──
  - name: Hacker News
    url: https://hnrss.org/frontpage
    type: rss
    tier: 3
    category: tech
    tags: [tech, dev, community]
    language: en

  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/technology-lab
    type: rss
    tier: 3
    category: tech
    tags: [tech, deep-dive]
    language: en

  - name: Wired
    url: https://www.wired.com/feed/rss
    type: rss
    tier: 3
    category: tech
    tags: [tech, culture]
    language: en
